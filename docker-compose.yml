version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: alphadog-db
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-alphadog123}
      POSTGRES_DB: alphadog
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - alphadog-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  data-pipeline:
    build: ./pipeline
    container_name: alphadog-pipeline
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-alphadog123}
      DB_NAME: alphadog
      DUNE_API_KEY: ${DUNE_API_KEY:-}
      DUNE_QUERY_ID: ${DUNE_QUERY_ID:-7450094}
      TOP_SYMBOLS: 150
    restart: unless-stopped

  scoring-engine:
    build: ./engine
    container_name: alphadog-engine
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-alphadog123}
      DB_NAME: alphadog
    restart: unless-stopped

  api:
    build: ./api
    container_name: alphadog-api
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-alphadog123}
      DB_NAME: alphadog
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: alphadog-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  alphadog-data:
